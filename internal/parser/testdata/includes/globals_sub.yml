dir: ./subglobal
silent: true
output: false

vars:
  sub_version: "2.0"

env:
  SUB_ENV: from-sub

tasks:
  no-overrides:
    run:
      - cmd: echo ${{ sub_version }}

  with-overrides:
    dir: ./subtask
    silent: false
    output: true
    vars:
      sub_version: "3.0"
    env:
      SUB_ENV: from-task
    run:
      - cmd: echo ${{ sub_version }}

  with-taskref:
    run:
      - task: no-overrides
        silent: true
        when: ${{ sub_version }}
